<div class="container my-5">
  <div class="text-center mb-5 p-4 bg-dark text-white rounded shadow">
    <h1>💼 Sistema Integral de Gestión (TFI - DAW)</h1>
    <p class="lead">Prototipo del Frontend conectado al contrato de la API</p>
  </div>

  @if (!usuarioLogueado) {
  <app-login-form (loginExitoso)="alLoguearse($event)"></app-login-form>
  } @else {
  <div class="alert alert-success mb-5">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <span><strong>¡Bienvenido, {{ usuarioActual.nombreUsuario }}!</strong> Tu
        estado es: <span class="badge bg-success">{{ usuarioActual.estado
          }}</span></span>
      <button (click)="cerrarSesion()"
        class="btn btn-sm btn-outline-danger">Cerrar Sesión</button>
    </div>
    <div class="bg-dark text-warning p-2 rounded small text-break">
      <strong>🔑 Token JWT recibido (Guardado en LocalStorage):</strong><br>
      <code>{{ tokenUsuario }}</code>
    </div>
  </div>

  <app-clientes-admin><app-clientes-admin
      [token]="tokenUsuario"></app-clientes-admin></app-clientes-admin>

  }
</div>
